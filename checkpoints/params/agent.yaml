seed: 42
num_steps_per_env: 24
max_iterations: 30000
obs_groups:
  actor: !!python/tuple
  - actor
  critic: !!python/tuple
  - critic
save_interval: 50
experiment_name: g1_lower_limb_velocity
run_name: ''
logger: wandb
wandb_project: mjlab
wandb_tags: !!python/tuple []
resume: false
load_run: .*
load_checkpoint: model_.*.pt
clip_actions: null
class_name: OnPolicyRunner
actor:
  hidden_dims: !!python/tuple
  - 256
  - 128
  - 64
  activation: elu
  obs_normalization: true
  init_noise_std: 1.0
  noise_std_type: scalar
  stochastic: true
critic:
  hidden_dims: !!python/tuple
  - 256
  - 128
  - 64
  activation: elu
  obs_normalization: true
  init_noise_std: 1.0
  noise_std_type: scalar
  stochastic: false
algorithm:
  num_learning_epochs: 5
  num_mini_batches: 4
  learning_rate: 0.001
  schedule: adaptive
  gamma: 0.99
  lam: 0.95
  entropy_coef: 0.01
  desired_kl: 0.01
  max_grad_norm: 1.0
  value_loss_coef: 1.0
  use_clipped_value_loss: true
  clip_param: 0.2
  normalize_advantage_per_mini_batch: false
  optimizer: adam
  rnd_cfg: null
  symmetry_cfg: null
multi_gpu: null
